<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" role="img" aria-label="MGS Master Collection Mod Kit — one-click vanilla-faithful fixes for Steam Deck and SteamOS">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f14"/>
      <stop offset="0.55" stop-color="#0c141b"/>
      <stop offset="1" stop-color="#0a1017"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4ade80"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.32" r="0.7">
      <stop offset="0" stop-color="#1b3a4b" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#0a0f14" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#1a2732" stroke-width="1" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- backdrop -->
  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#grid)"/>
  <rect width="1280" height="360" fill="url(#glow)"/>

  <!-- frame corner brackets (codec vibe) -->
  <g stroke="url(#accent)" stroke-width="2.5" fill="none" opacity="0.9">
    <path d="M28 28 h46 M28 28 v46"/>
    <path d="M1252 28 h-46 M1252 28 v46"/>
    <path d="M28 332 h46 M28 332 v-46"/>
    <path d="M1252 332 h-46 M1252 332 v-46"/>
  </g>

  <!-- kicker -->
  <text x="640" y="86" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace"
        font-size="17" letter-spacing="7" fill="#6bd6ff" opacity="0.85">STEAM&#160;DECK&#160;&#183;&#160;STEAMOS&#160;&#183;&#160;LINUX</text>

  <!-- title -->
  <text x="640" y="158" text-anchor="middle" font-family="Segoe UI,Helvetica,Arial,sans-serif"
        font-size="62" font-weight="800" letter-spacing="1.5" fill="#eef6f4">MGS&#160;MASTER&#160;COLLECTION</text>
  <text x="640" y="214" text-anchor="middle" font-family="Segoe UI,Helvetica,Arial,sans-serif"
        font-size="46" font-weight="800" letter-spacing="10" fill="url(#accent)">MOD&#160;KIT</text>

  <!-- subtitle -->
  <text x="640" y="252" text-anchor="middle" font-family="Segoe UI,Helvetica,Arial,sans-serif"
        font-size="20" fill="#9fb4c2">One-click, vanilla-faithful fixes for MGS&#160;1, 2 &amp; 3</text>

  <!-- divider -->
  <rect x="360" y="278" width="560" height="2" rx="1" fill="url(#accent)" opacity="0.5"/>

  <!-- three game panels -->
  <g font-family="ui-monospace,Menlo,Consolas,monospace">
    <!-- MGS1 -->
    <text x="213" y="316" text-anchor="middle" font-size="22" font-weight="700" fill="#eef6f4">MGS&#160;1</text>
    <text x="213" y="338" text-anchor="middle" font-size="12.5" fill="#7f96a5">MGSM2Fix</text>
    <!-- MGS2 -->
    <text x="640" y="316" text-anchor="middle" font-size="22" font-weight="700" fill="#eef6f4">MGS&#160;2</text>
    <text x="640" y="338" text-anchor="middle" font-size="12.5" fill="#7f96a5">HDFix + Bugfix + Audio</text>
    <!-- MGS3 -->
    <text x="1067" y="316" text-anchor="middle" font-size="22" font-weight="700" fill="#eef6f4">MGS&#160;3</text>
    <text x="1067" y="338" text-anchor="middle" font-size="12.5" fill="#7f96a5">HDFix + Bugfix + Audio</text>
  </g>
  <!-- panel dividers -->
  <g stroke="#24333f" stroke-width="1.5">
    <line x1="427" y1="300" x2="427" y2="342"/>
    <line x1="853" y1="300" x2="853" y2="342"/>
  </g>
</svg>
